cat > .github/workflows/ci-pipeline.yml << 'EOF'
name: CI Pipeline - Spring PetClinic + JFrog

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: spring-petclinic
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Maven to use Artifactory
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<MAVENEOF
          <settings>
            <servers>
              <server>
                <id>jfrog-artifactory</id>
                <username>${{ secrets.JFROG_USER }}</username>
                <password>${{ secrets.JFROG_TOKEN }}</password>
              </server>
            </servers>
            <mirrors>
              <mirror>
                <id>jfrog-artifactory</id>
                <mirrorOf>*</mirrorOf>
                <url>${{ secrets.JFROG_URL }}/artifactory/libs-virtual</url>
              </mirror>
            </mirrors>
          </settings>
          MAVENEOF

      - name: Compile
        run: ./mvnw compile -q

      - name: Test
        run: ./mvnw test -q

      - name: Package
        run: ./mvnw package -DskipTests -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: petclinic-jar
          path: target/spring-petclinic-*.jar

  docker-build:
    name: Build & Push Docker Image
    needs: build-and-test
    run
