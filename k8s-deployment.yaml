apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-petclinic
  namespace: petclinic
  labels:
    app: spring-petclinic
    version: "4.0.0-SNAPSHOT"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-petclinic
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: spring-petclinic
        version: "4.0.0-SNAPSHOT"
    spec:
      # Pull image from Artifactory docker-prod (promoted, scanned images only)
      imagePullSecrets:
        - name: jfrog-registry-secret

      # Non-root security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: spring-petclinic
          # Image pulled from Artifactory docker-prod repo
          # Only images that passed Xray scan are promoted here
          image: axde.jfrog.io/docker-prod/spring-petclinic:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Hardened security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # Resource limits
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Spring Boot needs /tmp for temp files
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3

      volumes:
        - name: tmp-dir
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: spring-petclinic
  namespace: petclinic
  labels:
    app: spring-petclinic
spec:
  type: ClusterIP
  selector:
    app: spring-petclinic
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
